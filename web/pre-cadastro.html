<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pré-Cadastro - Acesso Rápido - Rafiels Soluções</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0B1220 0%, #1F2937 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #111827;
      border-radius: 16px;
      border: 1px solid #374151;
      padding: 32px;
      max-width: 500px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: #2563EB;
      border-radius: 12px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    h1 {
      color: #FFF;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94A3B8;
      font-size: 14px;
      line-height: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #94A3B8;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      width: 100%;
      background: #1F2937;
      color: #FFF;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 15px;
      font-size: 14px;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus,
    textarea:focus {
      outline: none;
      border-color: #2563EB;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .photo-upload {
      border: 2px dashed #374151;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .photo-upload:hover {
      border-color: #2563EB;
      background: rgba(37, 99, 235, 0.05);
    }

    .photo-upload-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .photo-upload-text {
      color: #94A3B8;
      font-size: 14px;
      font-weight: 600;
    }

    .photo-preview {
      width: 100%;
      height: 200px;
      background: #1F2937;
      border-radius: 12px;
      margin-bottom: 12px;
      object-fit: cover;
    }

    .button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .button-primary {
      background: #2563EB;
      color: #FFF;
      margin-bottom: 12px;
    }

    .button-primary:hover {
      background: #1D4ED8;
    }

    .button-secondary {
      background: transparent;
      color: #94A3B8;
      border: 1px solid #374151;
    }

    .button-secondary:hover {
      border-color: #94A3B8;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10B981;
      border-radius: 12px;
      padding: 16px;
      color: #10B981;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .info-box {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid #3B82F6;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .info-box-title {
      color: #3B82F6;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .info-box-text {
      color: #94A3B8;
      font-size: 12px;
      line-height: 18px;
    }

    .loading {
      display: none;
      text-align: center;
      color: #94A3B8;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📸</div>
      <h1>Pré-Cadastro</h1>
      <p class="subtitle">Complete seu cadastro para agilizar o acesso ao condomínio</p>
    </div>

    <div class="success-message" id="successMessage">
      ✅ Cadastro realizado com sucesso! Você será redirecionado em breve.
    </div>

    <form id="preRegistrationForm">
      <div class="form-group">
        <label>Foto</label>
        <div class="photo-upload" id="photoUpload">
          <div class="photo-upload-icon">📷</div>
          <p class="photo-upload-text">Clique para enviar sua foto</p>
        </div>
        <img id="photoPreview" class="photo-preview" style="display: none;" />
        <input type="file" id="photoInput" accept="image/*" style="display: none;" />
      </div>

      <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" id="name" placeholder="Seu nome" required />
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label>Telefone / WhatsApp</label>
        <input type="tel" id="phone" placeholder="(13) 99999-9999" required />
      </div>

      <div class="info-box">
        <div class="info-box-title">⏰ Validade</div>
        <div class="info-box-text">
          Este link expira em 7 dias. Após isso, um novo link precisará ser gerado.
        </div>
      </div>

      <button type="submit" class="button button-primary">
        CONFIRMAR CADASTRO
      </button>

      <div class="loading" id="loading">
        Processando... Por favor, aguarde.
      </div>
    </form>
  </div>

  <script>
    const photoUpload = document.getElementById('photoUpload');
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    const form = document.getElementById('preRegistrationForm');
    const successMessage = document.getElementById('successMessage');
    const loading = document.getElementById('loading');

    photoUpload.addEventListener('click', () => {
      photoInput.click();
    });

    photoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          photoPreview.src = event.target.result;
          photoPreview.style.display = 'block';
          photoUpload.style.display = 'none';
        };
        reader.readAsDataURL(file);
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      loading.classList.add('show');

      // Simula envio para backend
      setTimeout(() => {
        loading.classList.remove('show');
        successMessage.classList.add('show');

        // Redireciona após 2 segundos
        setTimeout(() => {
          window.location.href = '/';
        }, 2000);
      }, 2000);
    });
  </script>
</body>
</html>
